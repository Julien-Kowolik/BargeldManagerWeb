<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Depot</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/images/logo.png" alt="Logo">
            <h2>Bargeld<span>Manager</span></h2>
        </div>

        <hr class="sidebar-line">

        <nav>
            <a th:href="@{/}">🏠 Startseite</a>
            <a class="active" th:href="@{/depot}">💼 Depot</a>
            <a th:href="@{/transaktion/neu}">➕ Neue Transaktion</a>
            <a th:href="@{/transaktionen}">📋 Transaktionen</a>
            <a th:href="@{/analyse}">📊 Analyse</a>
        </nav>

        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Logout</button>
            </form>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="user-badge">👤 Mein Depot</div>
        </div>

        <section class="hero">
            <img src="/images/logo.png" alt="Logo">
            <div>
                <h1>Mein <span>Depot</span></h1>
                <p>Dein aktueller Bargeldbestand.</p>
            </div>
        </section>

        <div class="content">
            <section class="stats">
                <div class="stat-card">
                    <div class="stat-icon icon-blue">💼</div>
                    <div>
                        <small>Aktueller Depotwert</small>
                        <strong th:text="${depotWert} + ' €'">0 €</strong>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>💼 Bestand nach Scheinen</h2>

                <div class="cash-row" th:each="eintrag : ${bestand}">
                    <span th:text="${eintrag.key.wert} + ' €'">50 €</span>
                    <div class="bar">
                        <div class="bar-fill"
                             th:style="'width:' + (${eintrag.value} * 20) + '%'">
                        </div>
                    </div>
                    <span th:text="${eintrag.value} + ' Stück'">0 Stück</span>
                </div>
            </section>
        </div>
    </main>
</div>

</body>
</html>
