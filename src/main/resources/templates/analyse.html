<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/images/logo.png" alt="Logo">
            <h2>Bargeld<span>Manager</span></h2>
        </div>

        <hr class="sidebar-line">

        <nav>
            <a th:href="@{/}">🏠 Startseite</a>
            <a th:href="@{/depot}">💼 Depot</a>
            <a th:href="@{/transaktion/neu}">➕ Neue Transaktion</a>
            <a th:href="@{/transaktionen}">📋 Transaktionen</a>
            <a class="active" th:href="@{/analyse}">📊 Analyse</a>
        </nav>

        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Logout</button>
            </form>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="user-badge">📊 Analyse</div>
        </div>

        <section class="hero">
            <img src="/images/logo.png" alt="Logo">
            <div>
                <h1>Deine <span>Analyse</span></h1>
                <p>Werte deine Einnahmen und Ausgaben aus.</p>
            </div>
        </section>

        <div class="content">
            <section class="stats">
                <div class="stat-card">
                    <div class="stat-icon icon-green">↗</div>
                    <div>
                        <small>Gesamteinnahmen</small>
                        <strong class="positive" th:text="${gesamtEinnahmen} + ' €'">0 €</strong>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon icon-red">↘</div>
                    <div>
                        <small>Gesamtausgaben</small>
                        <strong class="negative" th:text="${gesamtAusgaben} + ' €'">0 €</strong>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon icon-blue">💼</div>
                    <div>
                        <small>Depotwert</small>
                        <strong th:text="${depotWert} + ' €'">0 €</strong>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>📊 Ausgaben nach Kategorie</h2>

                <table>
                    <thead>
                    <tr>
                        <th>Kategorie</th>
                        <th>Betrag</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="eintrag : ${ausgabenNachKategorie}">
                        <td th:text="${eintrag.key.anzeigeName}">Gaming</td>
                        <td class="negative" th:text="${eintrag.value} + ' €'">0 €</td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>

</body>
</html>
