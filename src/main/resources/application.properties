spring.application.name=BargeldManager

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bargeldmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bargeldmanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
