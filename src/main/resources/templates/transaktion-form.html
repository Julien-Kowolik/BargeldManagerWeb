<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Neue Transaktion</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/images/logo.png" alt="Logo">
            <h2>Bargeld<span>Manager</span></h2>
        </div>

        <hr class="sidebar-line">

        <nav>
            <a th:href="@{/}">🏠 Startseite</a>
            <a th:href="@{/depot}">💼 Depot</a>
            <a class="active" th:href="@{/transaktion/neu}">➕ Neue Transaktion</a>
            <a th:href="@{/transaktionen}">📋 Transaktionen</a>
            <a th:href="@{/analyse}">📊 Analyse</a>
        </nav>

        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Logout</button>
            </form>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="user-badge">➕ Neue Transaktion</div>
        </div>

        <section class="hero">
            <img src="/images/logo.png" alt="Logo">
            <div>
                <h1>Neue <span>Transaktion</span></h1>
                <p>Erfasse Einnahmen oder Ausgaben.</p>
            </div>
        </section>

        <div class="content">
            <section class="card">
                <form th:action="@{/transaktion/neu}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <label>Typ</label>
                    <select name="typ">
                        <option th:each="typ : ${typen}" th:value="${typ}" th:text="${typ}">EINNAHME</option>
                    </select>

                    <label>Kategorie</label>
                    <select name="kategorie">
                        <option th:each="kategorie : ${kategorien}"
                                th:value="${kategorie}"
                                th:text="${kategorie.anzeigeName}">
                            Lebensmittel
                        </option>
                    </select>

                    <label>5€ Scheine</label>
                    <input type="number" name="euro5" min="0" value="0">

                    <label>10€ Scheine</label>
                    <input type="number" name="euro10" min="0" value="0">

                    <label>20€ Scheine</label>
                    <input type="number" name="euro20" min="0" value="0">

                    <label>50€ Scheine</label>
                    <input type="number" name="euro50" min="0" value="0">

                    <label>100€ Scheine</label>
                    <input type="number" name="euro100" min="0" value="0">

                    <label>200€ Scheine</label>
                    <input type="number" name="euro200" min="0" value="0">

                    <button type="submit">Speichern</button>
                </form>
            </section>
        </div>
    </main>
</div>

</body>
</html>
